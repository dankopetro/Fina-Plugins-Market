name: "Doorbell"
version: "3.5.8-22"
description: "Timbre Inteligente V3 (FFmpeg Puro)"
main: "doorbell_status.py"
scripts:
  monitor: "monitor_ergen.py"
enabled: true
priority: 50
intents:
  - name: "doorbell_hangup"
    patterns:
      - "corta el timbre"
      - "colga el timbre"
      - "terminar llamada"
      - "corta la llamada"
      - "cerrar timbre"
      - "colgar"
    response: "Cortando la comunicación."
    action: "hangup_doorbell.py"
